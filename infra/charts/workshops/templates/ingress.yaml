{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  annotations:
    tailscale.com/tags: {{ .Values.ingress.tags | quote }}
    tailscale.com/funnel: {{ .Values.ingress.funnel | quote }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  defaultBackend:
    service:
      name: {{ .Release.Name }}
      port:
        name: http
  tls:
    - hosts:
        - {{ .Values.ingress.hostname }}
{{- end }}
