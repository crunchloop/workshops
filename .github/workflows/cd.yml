name: CD

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: sa-east-1
  EKS_CLUSTER: k8-dev
  NAMESPACE: workshops
  IMAGE_NAME: ghcr.io/crunchloop/workshops

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-publish
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::176434290504:role/workshops-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install workshops \
            infra/charts/workshops \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values infra/k8/apps/values/workshops.yaml \
            --set image.tag=${{ needs.docker-publish.outputs.image-tag }} \
            --wait \
            --timeout 5m
